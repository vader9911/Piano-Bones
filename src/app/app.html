<div class="flex flex-col h-screen w-full bg-[#0A0A0B] text-slate-300 font-sans p-4 relative overflow-hidden">
  <!-- Header Overlay -->
  <header class="absolute top-6 left-6 right-6 z-20 flex items-center justify-between pointer-events-none">
    <div class="flex items-center gap-4 pointer-events-auto">
      <div class="h-10 w-10 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-black shadow-lg shadow-emerald-500/20">PV</div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white">POLYPHONY VISION</h1>
        <p class="text-xs font-mono opacity-60 uppercase tracking-widest">Assistance Studio</p>
      </div>
    </div>
    
    <!-- Future MIDI Controls (Placeholder) -->
    <div class="bg-black/60 backdrop-blur-md border border-white/10 rounded-full px-4 py-1.5 flex items-center gap-4 pointer-events-auto">
      <div class="flex items-center gap-2 text-xs font-mono mr-2">
        <span class="opacity-50">MIDI:</span>
        <span class="text-white max-w-[120px] truncate" [title]="midiTrackName()">{{ midiTrackName() }}</span>
      </div>

      <!-- Playback Controls -->
      <div class="flex items-center gap-1 border-l border-white/10 pl-4 pr-2">
        <button (click)="togglePlay()" [disabled]="!midiLoaded()" class="hover:bg-white/10 p-1.5 rounded-full transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
          @if (isMidiPlaying()) {
            <!-- Pause Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
          } @else {
            <!-- Play Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          }
        </button>
        <button (click)="stopMidi()" [disabled]="!midiLoaded()" class="hover:bg-white/10 p-1.5 rounded-full transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
          <!-- Stop Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"></rect></svg>
        </button>
      </div>

      <label class="bg-white/10 hover:bg-white/20 transition-colors px-4 py-1.5 rounded-full text-xs font-mono uppercase tracking-widest text-white border border-white/5 flex items-center gap-2 cursor-pointer ml-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Load
        <input type="file" accept=".mid,.midi" class="hidden" (change)="onMidiFileSelected($event)" />
      </label>
    </div>
  </header>

  <!-- Main Viewport (Full Stage) -->
  <div class="absolute inset-0 z-10" #threeContainer>
    <!-- Background Grid -->
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(to right, #4ade80 1px, transparent 1px), linear-gradient(to bottom, #4ade80 1px, transparent 1px); background-size: 64px 64px;"></div>
  </div>

  <!-- Subtle Status & Telemetry Overlay (Bottom) -->
  <footer class="absolute bottom-6 left-6 right-6 z-20 flex items-end justify-between pointer-events-none">
    
    <!-- System Log (Subtle) -->
    <div class="w-80 bg-black/40 backdrop-blur-md border border-white/5 rounded-xl p-4 font-mono text-[10px] flex flex-col pointer-events-auto shadow-2xl">
      <div class="flex items-center gap-2 mb-3 text-slate-500">
        <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_5px_#10b981]"></div>
        <span>TRACKING_ACTIVE :: 100FPS</span>
      </div>
      <div class="space-y-1 opacity-60">
        @for (log of logs(); track $index) {
          <div class="text-slate-400 truncate">{{ log }}</div>
        }
      </div>
    </div>

    <!-- Minimal Stats -->
    <div class="flex gap-4 pointer-events-auto text-xs font-mono uppercase tracking-widest bg-black/40 backdrop-blur-md border border-white/5 px-6 py-3 rounded-xl">
      <div class="flex gap-6">
        <div class="flex flex-col">
          <span class="opacity-40 text-[9px]">Wrist (Y)</span>
          <span class="text-white">{{ wristHeightCm() }}</span>
        </div>
        <div class="flex flex-col border-l border-white/10 pl-6">
          <span class="opacity-40 text-[9px]">Link</span>
          <span [class.text-emerald-400]="connected()" [class.text-red-400]="!connected()">
            {{ connected() ? 'STABLE' : 'DOWN' }}
          </span>
        </div>
      </div>
    </div>
  </footer>
</div>
